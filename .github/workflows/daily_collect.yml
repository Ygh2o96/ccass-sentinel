name: CCASS Daily Collection

on:
  schedule:
    # 10:00 UTC = 18:00 HKT (after T+1 settlement)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:  # Manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Setup Git LFS
        run: git lfs install
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install requests numpy
      
      - name: Run daily collection (with retry)
        env:
          PYTHONUNBUFFERED: '1'
          PYTHONPATH: 'scripts'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt ==="
            if python scripts/daily_runner.py; then
              echo "✅ daily_runner succeeded on attempt $attempt"
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "⚠️ Attempt $attempt failed, retrying in 60s..."
              sleep 60
            else
              echo "❌ All 3 attempts failed"
              exit 1
            fi
          done
      
      - name: Run thermodynamic layer
        continue-on-error: true
        run: python scripts/thermo_layer.py
        env:
          PYTHONUNBUFFERED: '1'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      
      - name: Commit and push
        run: |
          git config --local user.name "CCASS Sentinel Bot"
          git config --local user.email "sentinel@ccass.dev"
          
          # Check if there are changes
          git add data/ alerts/
          if git diff --staged --quiet; then
            echo "No new data collected"
            exit 0
          fi
          
          DATE=$(date -u +%Y-%m-%d)
          STOCKS=$(python -c "import json; d=json.load(open('data/ccass_timeseries.json')); print(len(d))")
          SNAPS=$(python -c "import json; d=json.load(open('data/ccass_timeseries.json')); print(sum(len(v) for v in d.values()))")
          
          git commit -m "📡 Daily CCASS: ${DATE} | ${STOCKS} stocks, ${SNAPS} total snapshots"
          git push
      
      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "import os,json,urllib.request; token=os.environ.get('TELEGRAM_BOT_TOKEN',''); chat=os.environ.get('TELEGRAM_CHAT_ID',''); d=json.dumps({'chat_id':int(chat),'text':'🔴 CCASS Daily FAILED'}).encode(); urllib.request.urlopen(urllib.request.Request(f'https://api.telegram.org/bot{token}/sendMessage',d,headers={'Content-Type':'application/json'}),timeout=10)" if [ -n "$TELEGRAM_BOT_TOKEN" ]; then echo "Alert sent"; fi
