name: Weekly New Listing Discovery

on:
  schedule:
    # Saturday 12:00 UTC = 20:00 HKT (weekly sweep for new listings)
    - cron: '0 12 * * 6'
  workflow_dispatch:  # Manual trigger

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Discover new listings
        run: python scripts/discover_new_listings.py
        env:
          PYTHONUNBUFFERED: '1'
          PYTHONPATH: 'scripts'
      
      - name: Commit and push
        run: |
          git config --local user.name "CCASS Sentinel Bot"
          git config --local user.email "sentinel@ccass.dev"
          
          git add data/watchlist.json
          if git diff --staged --quiet; then
            echo "No new listings discovered"
            exit 0
          fi
          
          NEW=$(git diff --staged data/watchlist.json | grep "^+" | grep "AUTO-DISCOVERED" | wc -l)
          TOTAL=$(python -c "import json; print(len(json.load(open('data/watchlist.json'))))")
          
          git commit -m "🆕 Auto-discovered ${NEW} new listing(s) | Watchlist: ${TOTAL} stocks"
          git push
