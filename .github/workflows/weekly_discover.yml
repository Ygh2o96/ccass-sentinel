name: Weekly New Listing Discovery

on:
  schedule:
    - cron: '0 12 * * 6'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Discover new listings
        env:
          PYTHONUNBUFFERED: '1'
          PYTHONPATH: scripts
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/discover_new_listings.py

      - name: Commit and push
        run: |
          git config --local user.name "CCASS Sentinel Bot"
          git config --local user.email "sentinel@ccass.dev"
          git add data/watchlist.json data/hkex_securities_snapshot.json
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          TOTAL=$(python -c "import json; print(len(json.load(open('data/watchlist.json'))))")
          git commit -m "Weekly discovery | Watchlist: ${TOTAL} stocks"
          git push

      - name: Alert on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":${TG_CHAT},\"text\":\"🔴 Weekly Discovery FAILED\"}"
          fi
