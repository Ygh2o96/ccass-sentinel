name: Weekly New Listing Discovery

on:
  schedule:
    # Saturday 12:00 UTC = 20:00 HKT (weekly sweep for new listings)
    - cron: '0 12 * * 6'
  workflow_dispatch:  # Manual trigger

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Discover new listings
        run: python scripts/discover_new_listings.py
        env:
          PYTHONUNBUFFERED: '1'
          PYTHONPATH: 'scripts'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCOVERY_MAX_CANDIDATES: '300'
          DISCOVERY_WALL_CLOCK_SECS: '4200'
      
      - name: Commit and push
        run: |
          git config --local user.name "CCASS Sentinel Bot"
          git config --local user.email "sentinel@ccass.dev"
          
          git add data/watchlist.json
          if git diff --staged --quiet; then
            echo "No new listings discovered"
            exit 0
          fi
          
          NEW=$(git diff --staged data/watchlist.json | grep "^+" | grep "AUTO-DISCOVERED" | wc -l)
          TOTAL=$(python -c "import json; print(len(json.load(open('data/watchlist.json'))))")
          
          git commit -m "🆕 Auto-discovered ${NEW} new listing(s) | Watchlist: ${TOTAL} stocks"
          git push

      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
import os,json,urllib.request
token=os.environ.get('TELEGRAM_BOT_TOKEN','')
chat=os.environ.get('TELEGRAM_CHAT_ID','')
if token and chat:
    d=json.dumps({'chat_id':int(chat),'text':'🔴 Weekly Discovery FAILED — check Actions'}).encode()
    urllib.request.urlopen(urllib.request.Request(
        f'https://api.telegram.org/bot{token}/sendMessage',d,
        headers={'Content-Type':'application/json'}),timeout=10)
"
